name: mobile
description: Uteki mobile app — iOS & Android
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^14.0.0

  # State management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.5

  # HTTP
  dio: ^5.4.0

  # Storage
  flutter_secure_storage: ^9.2.0
  shared_preferences: ^2.2.0

  # Social auth
  sign_in_with_apple: ^6.1.0
  google_sign_in: ^6.2.0

  # UI & animation
  flutter_animate: ^4.5.0

  # Charts
  fl_chart: ^0.68.0

  # Images
  cached_network_image: ^3.3.0

  # Localisation
  intl: ^0.19.0

  # Utilities
  uuid: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.0
  json_serializable: ^6.8.0
  json_annotation: ^4.9.0

flutter:
  uses-material-design: false
